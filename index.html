<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaniBet Liga 1 | Apuestas Reales</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --rani-green: #28a745; --dark: #121212; --win: #2ecc71; --loss: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding-bottom: 30px; }

        header { background: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--rani-green); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; }
        .balance-pill { background: #e8f5e9; color: var(--rani-green); padding: 8px 15px; border-radius: 20px; font-weight: 800; border: 1px solid #c8e6c9; }

        .app-container { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        @media (min-width: 1024px) { .app-container { grid-template-columns: 240px 1fr 340px; } }

        /* Navegación Liga 1 */
        .sidebar { background: white; border-radius: 12px; padding: 15px; border: 1px solid #ddd; height: fit-content; }
        .league-item { padding: 10px; border-radius: 8px; background: #f8f9fa; margin-bottom: 10px; font-weight: bold; border-left: 4px solid var(--rani-green); }

        /* Cards de Partidos */
        .match-card { background: white; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; overflow: hidden; }
        .match-header { padding: 8px 15px; background: #fdfdfd; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 11px; color: #888; }
        .match-body { padding: 15px; text-align: center; }
        .teams { font-weight: 700; font-size: 16px; margin-bottom: 12px; }
        .odds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .odd-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .odd-btn:hover { border-color: var(--rani-green); background: #f1f8f1; }
        .odd-btn.selected { background: var(--rani-green); color: white; border-color: var(--rani-green); }

        /* Boleta y Tickets */
        .slip-box { background: white; border-radius: 12px; border: 1px solid #ddd; position: sticky; top: 90px; overflow: hidden; }
        .slip-header { background: var(--dark); color: white; padding: 12px; font-weight: bold; text-align: center; }
        .ticket-item { padding: 12px; border-bottom: 1px solid #eee; position: relative; }
        .status-won { color: var(--win); font-weight: bold; }
        .status-open { color: #f39c12; font-weight: bold; }

        .btn-bet { width: 100%; padding: 15px; background: var(--rani-green); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">🐸 RANI<span style="color:var(--rani-green)">BET</span></div>
    <div id="user-area" style="display:flex; align-items:center; gap:12px;">
        <div id="g_id_onload" data-client_id="6300462154-9uoaapb6jcbbe6semt477k2adv6s8f1p.apps.googleusercontent.com" data-callback="onSignIn"></div>
        <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
        <div id="profile" style="display:none; align-items:center; gap:10px;">
            <div class="balance-pill">RC <span id="coins">0</span></div>
            <img id="u-photo" src="" style="width:35px; border-radius:50%;">
        </div>
    </div>
</header>

<div class="app-container">
    <aside class="sidebar">
        <div class="league-item">🇵🇪 Liga 1 Te Apuesto</div>
        <div style="padding:10px; font-size:12px; color:#666;">Selecciona tus partidos favoritos y arma tu combinada.</div>
    </aside>

    <main>
        <div id="matches">Cargando mercados de Liga 1...</div>
        
        <h3 style="margin-top:30px;">📋 Mis Tickets Ganados y Abiertos</h3>
        <div id="history-list"></div>
    </main>

    <aside>
        <div class="slip-box">
            <div class="slip-header">BOLETA ACTUAL</div>
            <div id="slip-content" style="padding:15px; text-align:center;">Selecciona un partido</div>
            <div id="bet-actions" style="padding:15px; display:none; background:#fcfcfc;">
                <div style="font-size:18px; font-weight:bold; margin-bottom:10px; color:var(--rani-green);">Cuota: <span id="total-odd">0.00</span></div>
                <input type="number" id="stake" value="10" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd; margin-bottom:10px; text-align:center;">
                <button class="btn-bet" onclick="placeBet()">PROCESAR TICKET</button>
            </div>
        </div>
    </aside>
</div>

<script>
    let coins = parseInt(localStorage.getItem('rani_coins')) || 500;
    let tickets = JSON.parse(localStorage.getItem('rani_tickets')) || [];
    let currentBets = [];

    function update() {
        document.getElementById('coins').innerText = coins;
        localStorage.setItem('rani_coins', coins);
        localStorage.setItem('rani_tickets', JSON.stringify(tickets));
        renderTickets();
    }

    function onSignIn(resp) {
        const u = JSON.parse(atob(resp.credential.split('.')[1]));
        document.querySelector('.g_id_signin').style.display='none';
        document.getElementById('profile').style.display='flex';
        document.getElementById('u-photo').src = u.picture;
        update();
    }

    async function load() {
        const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTrSV31J-OEkp58qUQJUYGpu0mjISCNF4-Zelw1705EcISzAlccksrhi_nKu2FagnruaZqrd-dzAbGk/pub?output=csv");
        const data = await res.text();
        const rows = data.split('\n').slice(2);
        
        document.getElementById('matches').innerHTML = rows.map((r, i) => {
            const c = r.split(',');
            if(c.length < 7) return "";
            return `
                <div class="match-card">
                    <div class="match-header"><span>🇵🇪 Liga 1</span> <span>${c[5]}</span></div>
                    <div class="match-body">
                        <div class="teams">${c[0]}</div>
                        <div class="odds-grid">
                            <button class="odd-btn" onclick="add(this,${i},'${c[0]}','Local',${c[1]})">L ${c[1]}</button>
                            <button class="odd-btn" onclick="add(this,${i},'${c[0]}','Empate',${c[2]})">E ${c[2]}</button>
                            <button class="odd-btn" onclick="add(this,${i},'${c[0]}','Visita',${c[3]})">V ${c[3]}</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function add(btn, id, match, pick, odd) {
        currentBets = currentBets.filter(b => b.id !== id);
        currentBets.push({id, match, pick, odd});
        
        btn.parentElement.querySelectorAll('.odd-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');

        const totalOdd = currentBets.reduce((a, b) => a * b.odd, 1).toFixed(2);
        document.getElementById('total-odd').innerText = totalOdd;
        document.getElementById('slip-content').innerHTML = currentBets.map(b => `<div><b>${b.match}</b>: ${b.pick}</div>`).join('');
        document.getElementById('bet-actions').style.display = 'block';
    }

    function placeBet() {
        const stake = parseInt(document.getElementById('stake').value);
        if(stake > coins) return alert("Rani Coins insuficientes");
        
        coins -= stake;
        const ticket = {
            num: 'TK-' + Math.floor(Math.random()*90000),
            items: [...currentBets],
            odd: parseFloat(document.getElementById('total-odd').innerText),
            stake: stake,
            status: 'Abierto',
            date: new Date().toLocaleDateString()
        };
        
        tickets.unshift(ticket);
        currentBets = [];
        document.getElementById('bet-actions').style.display = 'none';
        document.getElementById('slip-content').innerText = "Selecciona un partido";
        document.querySelectorAll('.odd-btn').forEach(b => b.classList.remove('selected'));
        
        // Simular Ganancia (Función de Casa de Apuestas)
        setTimeout(() => {
            if(Math.random() > 0.6) {
                ticket.status = 'Ganado';
                coins += Math.round(ticket.stake * ticket.odd);
                update();
            }
        }, 3000);
        
        update();
    }

    function renderTickets() {
        document.getElementById('history-list').innerHTML = tickets.map(t => `
            <div class="match-card" style="padding:15px; font-size:13px; border-left: 5px solid ${t.status === 'Ganado' ? 'var(--win)' : '#ddd'}">
                <div style="display:flex; justify-content:space-between;">
                    <b>${t.num}</b> 
                    <span class="${t.status === 'Ganado' ? 'status-won' : 'status-open'}">${t.status}</span>
                </div>
                <div style="margin:8px 0;">${t.items.map(i => i.match + " (" + i.pick + ")").join(' + ')}</div>
                <div style="color:#666;">Apostado: ${t.stake} RC | Pago: <b>${(t.stake * t.odd).toFixed(2)} RC</b></div>
            </div>
        `).join('');
    }

    load();
    update();
</script>
</body>
</html>
