<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaniBet - Liga 1</title>
    <style>
        :root { --rani-green: #28a745; --bg-light: #f4f7f6; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-light); margin: 0; color: #333; }
        
        /* Header */
        header { background: #fff; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--rani-green); }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-text { font-weight: bold; font-size: 22px; color: #1a3a3a; letter-spacing: -1px; }
        .google-btn { border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; background: white; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }

        /* Layout */
        .main-container { max-width: 1200px; margin: 20px auto; display: flex; gap: 20px; padding: 0 15px; }
        .sidebar { width: 250px; flex-shrink: 0; }
        .content { flex-grow: 1; }

        /* Banner */
        .banner { background: var(--rani-green); border-radius: 15px; padding: 30px; color: white; position: relative; overflow: hidden; margin-bottom: 20px; }
        .banner h2 { margin: 0; font-style: italic; font-size: 28px; text-transform: uppercase; }
        .banner p { margin: 10px 0; font-size: 14px; }
        .promo-code { background: white; color: var(--rani-green); padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .banner-bg-text { position: absolute; right: -20px; bottom: -10px; font-size: 100px; font-weight: bold; opacity: 0.1; font-style: italic; }

        /* Competencias Sidebar */
        .section-title { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #444; border-left: 4px solid var(--rani-green); padding-left: 10px; margin-bottom: 15px; }
        .comp-list { background: white; border-radius: 8px; border: 1px solid #eee; overflow: hidden; }
        .comp-item { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-size: 13px; cursor: pointer; }
        .comp-item.active { border-left: 4px solid var(--rani-green); background: #f9fff9; font-weight: bold; }

        /* Partidos Grid */
        .partidos-grid { display: grid; gap: 15px; }
        .partido-card { background: white; border-radius: 10px; padding: 15px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 10px; }
        .teams { font-weight: bold; font-size: 16px; margin-bottom: 15px; text-align: center; }
        .odds-container { display: flex; gap: 8px; }
        .odd-box { flex: 1; background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.2s; }
        .odd-box:hover { border-color: var(--rani-green); background: #f0fff0; }
        .odd-box span { display: block; font-size: 10px; color: #999; }
        .odd-box b { color: var(--rani-green); font-size: 15px; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; order: 2; }
            .content { order: 1; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <span style="font-size: 30px;">🐸</span>
        <span class="logo-text">RANI<span style="color:var(--rani-green)">BET</span></span>
    </div>
    <button class="google-btn">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Acceder con Google
    </button>
</header>

<div class="main-container">
    <aside class="sidebar">
        <div class="section-title">Competencias</div>
        <div class="comp-list">
            <div class="comp-item active">🇵🇪 Liga 1 Perú ★</div>
            <div class="comp-item">🇪🇸 La Liga</div>
            <div class="comp-item">🇬🇧 Premier League</div>
        </div>
        
        <div class="section-title" style="margin-top:20px;">Canjear Bono</div>
        <div style="background:white; padding:15px; border-radius:8px; border:1px solid #eee; text-align:center;">
            <input type="text" placeholder="EJ: RANA50" style="width:90%; padding:10px; border:1px solid #ddd; border-radius:5px; margin-bottom:10px; text-align:center; background:#f8f9fa;">
            <button style="background:var(--rani-green); color:white; border:none; width:100%; padding:12px; border-radius:5px; font-weight:bold; cursor:pointer;">RECLAMAR RANI COINS</button>
        </div>
    </aside>

    <main class="content">
        <div class="banner">
            <h2>¡Tu primer depósito vale doble!</h2>
            <p>Usa el código <span class="promo-code">RANA50</span></p>
            <div class="banner-bg-text">LIGA 1</div>
        </div>

        <div id="lista-partidos" class="partidos-grid">
            <!-- Cargando desde Excel... -->
        </div>
    </main>
</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrSV31J-OEkp58qUQJUYGpu0mjISCNF4-Zelw1705EcISzAlccksrhi_nKu2FagnruaZqrd-dzAbGk/pub?output=csv";
    
    async function cargarPartidos() {
        try {
            const res = await fetch(url);
            const data = await res.text();
            const filas = data.split("\n").slice(2);
            
            document.getElementById("lista-partidos").innerHTML = filas.map(f => {
                const c = f.split(",");
                if (c.length < 7) return "";
                const enVivo = c[6].toUpperCase().includes("VIVO");
                return `
                    <div class="partido-card">
                        <div class="card-header">
                            <span>${c[4]}</span>
                            <span style="color:${enVivo?'red':'#888'}">${enVivo ? '🔴 EN VIVO' : c[5]}</span>
                        </div>
                        <div class="teams">${c[0]}</div>
                        <div class="odds-container">
                            <div class="odd-box"><span>Local</span><b>${c[1]}</b></div>
                            <div class="odd-box"><span>Empate</span><b>${c[2]}</b></div>
                            <div class="odd-box"><span>Visita</span><b>${c[3]}</b></div>
                        </div>
                    </div>`;
            }).join("");
        } catch (e) { console.error(e); }
    }
    cargarPartidos();
</script>

</body>
</html>
