<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaniBet | Apuestas Reales</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --rani-green: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        header { background: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--rani-green); position: sticky; top: 0; z-index: 100; }
        .logo-box { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 20px; }
        .user-panel { display: flex; align-items: center; gap: 15px; }
        .coins-display { background: #fff3cd; padding: 5px 12px; border-radius: 20px; font-weight: bold; border: 1px solid #ffeeba; display: none; }
        
        /* Layout */
        .main-layout { display: grid; grid-template-columns: 240px 1fr 300px; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .sidebar { background: white; border-radius: 8px; border: 1px solid #eee; height: fit-content; overflow: hidden; }
        .side-title { background: #f8f9fa; padding: 10px 15px; font-size: 12px; font-weight: bold; color: #666; border-bottom: 1px solid #eee; }
        .side-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .side-item.active { border-left: 4px solid var(--rani-green); background: #f0fff0; font-weight: bold; }

        /* Banner */
        .banner { background: var(--rani-green); border-radius: 12px; padding: 30px; color: white; margin-bottom: 20px; position: relative; overflow: hidden; }
        .banner h2 { margin: 0; font-style: italic; font-size: 26px; }

        /* Partidos */
        .match-card { background: white; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; padding: 15px; }
        .match-teams { font-weight: bold; font-size: 16px; text-align: center; margin: 15px 0; }
        .odds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .odd-btn { border: 1px solid #ddd; padding: 10px; border-radius: 6px; background: #fbfbfb; cursor: pointer; text-align: center; }
        .odd-btn.selected { background: var(--rani-green); color: white; }

        /* Ticket */
        .bet-slip { background: white; border-radius: 8px; border: 1px solid #eee; height: fit-content; position: sticky; top: 80px; }
        .slip-header { background: #222; color: white; padding: 12px; font-weight: bold; }
        .slip-content { padding: 15px; min-height: 100px; font-size: 13px; text-align: center; }
        .bet-actions { border-top: 1px solid #eee; padding: 15px; display: none; }
        .btn-apostar { background: var(--rani-green); color: white; width: 100%; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-box"><span>🐸</span> RANI<span style="color:var(--rani-green)">BET</span></div>
    <div class="user-panel">
        <div id="coins-container" class="coins-display">💰 <span id="user-coins">500</span> RC</div>
        <div id="g_id_onload"
             data-client_id="845543666326-0nsqm9unm5888e999v7d9p0m0h1e7h2j.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
        <div id="user-profile" style="display:none; align-items:center; gap:10px;">
            <span id="user-name" style="font-weight:bold; font-size:14px;"></span>
            <img id="user-img" src="" style="width:32px; border-radius:50%;">
        </div>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar">
        <div class="side-title">LIGAS</div>
        <div class="side-item active">🇵🇪 Liga 1</div>
        <div class="side-item">🏆 Libertadores</div>
    </aside>

    <main>
        <div class="banner">
            <h2>¡TU PRIMER DEPÓSITO VALE DOBLE!</h2>
        </div>
        <div id="lista-partidos"></div>
    </main>

    <aside class="bet-slip">
        <div class="slip-header">BOLETO DE APUESTA</div>
        <div id="slip-body" class="slip-content">Selecciona una cuota</div>
        <div id="bet-actions" class="bet-actions">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>Monto:</span> <input type="number" id="bet-amount" value="10" style="width:60px;">
            </div>
            <button class="btn-apostar" onclick="apostar()">APRESTAR AHORA</button>
        </div>
    </aside>
</div>

<script>
    let coins = 500;
    let seleccionActual = null;

    function handleCredentialResponse(response) {
        const data = JSON.parse(atob(response.credential.split('.')[1]));
        document.querySelector(".g_id_signin").style.display = "none";
        document.getElementById("user-profile").style.display = "flex";
        document.getElementById("coins-container").style.display = "block";
        document.getElementById("user-name").innerText = data.given_name;
        document.getElementById("user-img").src = data.picture;
        console.log("Sesión iniciada como: " + data.name);
    }

    async function cargarPartidos() {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrSV31J-OEkp58qUQJUYGpu0mjISCNF4-Zelw1705EcISzAlccksrhi_nKu2FagnruaZqrd-dzAbGk/pub?output=csv";
        const res = await fetch(url);
        const csv = await res.text();
        const filas = csv.split("\n").slice(2);
        
        document.getElementById("lista-partidos").innerHTML = filas.map((f, i) => {
            const c = f.split(",");
            if (c.length < 7) return "";
            return `
                <div class="match-card">
                    <div class="match-teams">${c[0]}</div>
                    <div class="odds-grid">
                        <div class="odd-btn" onclick="addTicket('${c[0]}', ${c[1]}, 'Local')">1<br><b>${c[1]}</b></div>
                        <div class="odd-btn" onclick="addTicket('${c[0]}', ${c[2]}, 'Empate')">X<br><b>${c[2]}</b></div>
                        <div class="odd-btn" onclick="addTicket('${c[0]}', ${c[3]}, 'Visita')">2<br><b>${c[3]}</b></div>
                    </div>
                </div>`;
        }).join("");
    }

    function addTicket(partido, cuota, tipo) {
        seleccionActual = { partido, cuota, monto: 10 };
        document.getElementById("slip-body").innerHTML = `<b>${partido}</b><br>${tipo}: ${cuota}`;
        document.getElementById("bet-actions").style.display = "block";
    }

    function apostar() {
        const monto = parseInt(document.getElementById("bet-amount").value);
        if(monto > coins) return alert("Rani Coins insuficientes");
        coins -= monto;
        document.getElementById("user-coins").innerText = coins;
        alert("¡Apuesta exitosa!");
    }

    cargarPartidos();
</script>
</body>
</html>
