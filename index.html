<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RaniBet - En Vivo</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; gap: 15px; max-width: 500px; margin: auto; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .vivo { border-color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .cuotas { display: flex; gap: 5px; margin: 10px 0; }
        button { flex: 1; padding: 10px; background: #333; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1 style="color: #00ff00;">🐸 RANI BET FIXTURE</h1>
    <div id="partidos" class="grid">Cargando partidos reales...</div>

    <script>
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrSV31J-OEkp58qUQJUYGpu0mjISCNF4-Zelw1705EcISzAlccksrhi_nKu2FagnruaZqrd-dzAbGk/pub?output=csv";
        async function cargar() {
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const filas = csv.split("\n").slice(2);
                document.getElementById("partidos").innerHTML = filas.map(f => {
                    const c = f.split(",");
                    if (c.length < 7) return "";
                    const enVivo = c[6].toUpperCase().includes("VIVO");
                    return `
                        <div class="card ${enVivo ? 'vivo' : ''}">
                            <div style="font-size: 10px; color: #888;">${c[4]}</div>
                            <div style="font-size: 18px; margin: 5px 0;"><b>${c[0]}</b></div>
                            <div class="cuotas">
                                <button>L ${c[1]}</button><button>E ${c[2]}</button><button>V ${c[3]}</button>
                            </div>
                            <div style="color: ${enVivo ? 'red' : '#00ff00'}; font-weight: bold;">
                                ${enVivo ? '🔴 EN VIVO' : c[5]}
                            </div>
                        </div>`;
                }).join("");
            } catch (e) { document.getElementById("partidos").innerHTML = "Error de conexión"; }
        }
        cargar();
    </script>
</body>
</html>
