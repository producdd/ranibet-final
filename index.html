<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rani Bet | Olimpo Style</title>
    <style>
        :root { --rani-green: #28a745; --light-bg: #f4f7f6; --white: #ffffff; }
        body { background: var(--light-bg); color: #333; font-family: 'Arial', sans-serif; margin: 0; padding-bottom: 80px; }
        
        header { background: var(--white); padding: 15px; text-align: center; border-bottom: 3px solid var(--rani-green); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { color: var(--rani-green); font-weight: bold; font-size: 24px; margin: 0; }

        .grid { display: grid; gap: 15px; max-width: 600px; margin: 20px auto; padding: 0 10px; }
        
        /* Tarjetas Estilo Olimpo */
        .card { background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .card-header { background: #f8f9fa; padding: 8px 15px; font-size: 11px; color: #666; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .card-body { padding: 15px; text-align: center; }
        .teams { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #222; }
        
        .odds-row { display: flex; gap: 10px; justify-content: center; }
        .odd-btn { flex: 1; background: #fdfdfd; border: 1px solid #ddd; padding: 10px 5px; border-radius: 5px; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
        .odd-btn:hover { border-color: var(--rani-green); background: #f0fff0; }
        .odd-label { font-size: 10px; color: #888; margin-bottom: 2px; }
        .odd-value { font-weight: bold; color: var(--rani-green); }

        .card-footer { padding: 8px; font-size: 12px; background: #fff; border-top: 1px dotted #eee; color: #444; }
        .live-tag { color: #dc3545; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Navegación Inferior */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; border-top: 1px solid #ddd; padding: 10px 0; }
        .nav-btn { flex: 1; text-align: center; font-size: 12px; color: #666; text-decoration: none; }
        .nav-btn.active { color: var(--rani-green); font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🐸 RANI BET</div>
    </header>

    <div id="lista-partidos" class="grid">
        <!-- Los partidos se cargan aquí -->
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-btn active">Inicio</a>
        <a href="#" class="nav-btn">En Vivo</a>
        <a href="#" class="nav-btn">Apuestas</a>
        <a href="#" class="nav-btn">Cuenta</a>
    </nav>

    <script>
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrSV31J-OEkp58qUQJUYGpu0mjISCNF4-Zelw1705EcISzAlccksrhi_nKu2FagnruaZqrd-dzAbGk/pub?output=csv";
        
        async function actualizarUI() {
            try {
                const res = await fetch(url);
                const data = await res.text();
                const filas = data.split("\n").slice(2);
                
                const container = document.getElementById("lista-partidos");
                container.innerHTML = filas.map(f => {
                    const c = f.split(",");
                    if (c.length < 7) return "";
                    const enVivo = c[6].toUpperCase().includes("VIVO");
                    
                    return `
                        <div class="card">
                            <div class="card-header">
                                <span>${c[4]}</span>
                                <span>ID: ${Math.floor(Math.random() * 9000)}</span>
                            </div>
                            <div class="card-body">
                                <div class="teams">${c[0]}</div>
                                <div class="odds-row">
                                    <div class="odd-btn"><span class="odd-label">Local</span><span class="odd-value">${c[1]}</span></div>
                                    <div class="odd-btn"><span class="odd-label">Empate</span><span class="odd-value">${c[2]}</span></div>
                                    <div class="odd-btn"><span class="odd-label">Visita</span><span class="odd-value">${c[3]}</span></div>
                                </div>
                            </div>
                            <div class="card-footer">
                                ${enVivo ? '<span class="live-tag">🔴 EN VIVO</span>' : '🕒 ' + c[5]}
                            </div>
                        </div>`;
                }).join("");
            } catch (e) { console.error("Error:", e); }
        }

        actualizarUI();
        setInterval(actualizarUI, 30000);
    </script>
</body>
</html>
