<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rani Bet | Apuestas Deportivas</title>
    <style>
        :root { --green: #00ff00; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 70px; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .grid { display: grid; gap: 15px; max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--gray); padding: 15px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: var(--green); }
        .cuotas { display: flex; gap: 8px; margin: 12px 0; }
        button { flex: 1; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; }
        .active { color: var(--green); }
    </style>
</head>
<body>
    <header>
        <h1 style="color: var(--green); margin: 0;">🐸 RANI BET</h1>
    </header>

    <div id="partidos" class="grid">
        <p style="text-align: center; color: #666;">Actualizando cuotas desde el servidor...</p>
    </div>

    <nav class="nav-bottom">
        <a href="#" class="nav-item active">🏠 Inicio</a>
        <a href="#" class="nav-item">🔴 En Vivo</a>
        <a href="#" class="nav-item">📋 Mis Apuestas</a>
        <a href="#" class="nav-item">👤 Perfil</a>
    </nav>

    <script>
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrSV31J-OEkp58qUQJUYGpu0mjISCNF4-Zelw1705EcISzAlccksrhi_nKu2FagnruaZqrd-dzAbGk/pub?output=csv";
        async function cargar() {
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const filas = csv.split("\n").slice(2);
                document.getElementById("partidos").innerHTML = filas.map(f => {
                    const c = f.split(",");
                    if (c.length < 7) return "";
                    const enVivo = c[6].toUpperCase().includes("VIVO");
                    return `
                        <div class="card">
                            <div style="font-size: 11px; color: #00ff00; text-transform: uppercase; font-weight: bold;">${c[4]}</div>
                            <div style="font-size: 18px; margin: 8px 0;">${c[0]}</div>
                            <div class="cuotas">
                                <button>L ${c[1]}</button><button>E ${c[2]}</button><button>V ${c[3]}</button>
                            </div>
                            <div style="font-size: 13px; color: ${enVivo ? 'red' : '#aaa'}; font-weight: bold;">
                                ${enVivo ? '🔴 EN VIVO' : '📅 ' + c[5]}
                            </div>
                        </div>`;
                }).join("");
            } catch (e) { console.error(e); }
        }
        cargar();
        setInterval(cargar, 30000); // Auto-actualiza cada 30 segundos
    </script>
</body>
</html>
