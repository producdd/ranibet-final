<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANI BET 🐸 - Liga 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Barlow+Condensed:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .font-orb {
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen pb-20">
    <nav class="border-b border-gray-800 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🐸</span>
                <span class="font-orb text-xl font-bold text-green-500 tracking-tighter">RANI BET</span>
            </div>
            <div id="user-info" class="hidden flex items-center gap-4">
                <div class="bg-gray-900 border border-green-500/30 px-3 py-1 rounded-full flex items-center gap-2">
                    <span id="balance-val" class="font-orb text-green-400 font-bold">0.00</span>
                    <span class="text-[10px] text-green-600">RC</span>
                </div>
                <img id="user-photo" src="" class="w-8 h-8 rounded-full border border-gray-700">
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 mt-8">
        <div
            class="bg-gradient-to-r from-green-900/20 to-black border border-green-500/20 rounded-xl p-6 mb-8 text-center">
            <h2 class="font-orb text-lg mb-4">CANJEAR CÓDIGO DE STREAM</h2>
            <div class="flex max-w-sm mx-auto gap-2">
                <input id="code-input" type="text" placeholder="RANA50"
                    class="flex-1 bg-black border border-gray-700 rounded-lg px-4 py-2 uppercase font-orb outline-none focus:border-green-500">
                <button onclick="canjearCodigo()"
                    class="bg-green-500 text-black font-bold px-4 py-2 rounded-lg hover:bg-green-400 transition">CANJEAR</button>
            </div>
        </div>
        <div id="fixture-container" class="grid gap-4 md:grid-cols-2"></div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[100] p-4">
        <div class="bg-gray-900 border border-green-500/50 p-8 rounded-2xl max-w-sm w-full text-center">
            <div class="text-5xl mb-4">🐸</div>
            <h2 class="font-orb text-2xl mb-2 text-green-500">ACCESO SEGURO</h2>
            <p class="text-gray-400 text-sm mb-6">Inicia sesión para proteger tus Rani Coins.</p>

            <div id="g_id_onload"
                data-client_id="6300462154-9uoaapb6jcbbe6semt477k2adv6s8f1p.apps.googleusercontent.com"
                data-callback="handleCredentialResponse" data-auto_prompt="false">
            </div>
            <div class="g_id_signin flex justify-center" data-type="standard"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
